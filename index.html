<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1" />
  <title>Class Manager — Sign In</title>
  <link rel="icon" type="image/svg+xml" href="cm-icon.svg" />
  <link rel="apple-touch-icon" sizes="180x180" href="cm-icon.svg" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  <meta name="apple-mobile-web-app-title" content="Class Manager" />
  <meta name="theme-color" content="#0b0d10" />
  <style>
    :root{ --bg:#0b0d10; --card:#141820; --muted:#a7b0be; --text:#e6eef8; --accent:#5eead4; --border:rgba(255,255,255,.1); }
    *{box-sizing:border-box}
    html,body{height:100%;margin:0;font-family:system-ui,-apple-system,Segoe UI,Roboto,Inter,Arial,sans-serif;background:var(--bg);color:var(--text)}
    body{display:flex;align-items:center;justify-content:center;padding:16px;min-height:100vh}
    .card{background:var(--card);border:1px solid rgba(255,255,255,.12);border-radius:20px;padding:24px 22px 28px;width:100%;max-width:400px}
    .logo{text-align:center;margin-bottom:18px}
    .logo h1{margin:8px 0 2px;font-size:20px;font-weight:700}
    .fg{display:flex;flex-direction:column;gap:5px;margin-bottom:11px}
    label{font-size:13px;font-weight:500;color:var(--muted)}
    input[type=email],input[type=password]{background:#0f131a;border:1px solid var(--border);border-radius:10px;color:var(--text);font-size:15px;padding:10px 13px;width:100%;outline:none;font-family:inherit;transition:border-color .15s}
    input:focus{border-color:var(--accent)}
    .check-row{display:flex;align-items:center;gap:8px;margin-bottom:12px}
    .check-row input[type=checkbox]{width:16px;height:16px;accent-color:var(--accent);cursor:pointer;flex:none}
    .check-row label{font-size:13px;color:var(--muted);cursor:pointer;user-select:none;margin:0}
    .btn{background:rgba(255,255,255,.07);border:1px solid rgba(255,255,255,.12);border-radius:10px;color:var(--text);cursor:pointer;font-family:inherit;font-size:14px;padding:10px 16px;width:100%;transition:background .15s}
    .btn:hover{background:rgba(255,255,255,.12)}
    .btn.primary{background:var(--accent);color:#0b0d10;border-color:transparent;font-weight:600}
    .btn.primary:hover{background:#4dd4c0}
    .msg{font-size:13px;min-height:18px;text-align:center;margin-top:8px}
    .err{color:#f87171}.ok{color:#4ade80}
    .reset-btn{background:none;border:none;color:var(--muted);font-size:12px;cursor:pointer;text-decoration:underline;display:block;margin:12px auto 0;font-family:inherit}
    .spinner{display:none;text-align:center;padding:20px;color:var(--muted);font-size:14px}
    .spin{display:inline-block;width:22px;height:22px;border:2px solid rgba(255,255,255,.15);border-top-color:var(--accent);border-radius:50%;animation:spin .7s linear infinite;vertical-align:middle;margin-right:8px}
    @keyframes spin{to{transform:rotate(360deg)}}
  </style>
</head>
<body>
  <div id="loading" class="spinner card" style="display:flex;align-items:center;justify-content:center;gap:10px">
    <div class="spin"></div><span>Checking session…</span>
  </div>

  <div id="form-card" class="card" style="display:none">
    <div class="logo">
      <img src="cm-icon.svg" alt="Class Manager" style="width:56px;height:56px;border-radius:14px" />
      <h1>Class Manager</h1>
      <p style="font-size:12px;color:var(--muted);margin:4px 0 0">Sign in to continue</p>
    </div>

    <div class="fg">
      <label>Email</label>
      <input id="email" type="email" inputmode="email" autocomplete="email" placeholder="you@example.com" />
    </div>
    <div class="fg">
      <label>Password</label>
      <input id="pass" type="password" autocomplete="current-password" placeholder="Password" />
    </div>

    <div class="check-row">
      <input type="checkbox" id="remember-me" checked />
      <label for="remember-me">Remember me</label>
    </div>

    <button id="btn-login" class="btn primary">Sign In</button>
    <div id="msg" class="msg"></div>
    <button id="btn-reset" class="reset-btn">Forgot password?</button>
  </div>

  <script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-auth-compat.js"></script>
  <script>
    firebase.initializeApp({
      apiKey: "AIzaSyDDCM69agn_siiIwd9429urrd6ShAQXnyE",
      authDomain: "classmanager-ad588.firebaseapp.com",
      databaseURL: "https://classmanager-ad588-default-rtdb.firebaseio.com",
      projectId: "classmanager-ad588",
      storageBucket: "classmanager-ad588.firebasestorage.app",
      messagingSenderId: "1016222970430",
      appId: "1:1016222970430:web:7e1077fe12ef369ae4576f",
      measurementId: "G-6KX9NP2W7X"
    });
    const fbAuth = firebase.auth();
    const $ = id => document.getElementById(id);

    const ADMIN_EMAIL = 'eliasacaldwellnrp@gmail.com';

    fbAuth.onAuthStateChanged(user => {
      if (user) {
        if (user.email !== ADMIN_EMAIL) {
          fbAuth.signOut();
          return;
        }
        window.location.replace('dashboard.html');
      } else {
        $('loading').style.display = 'none';
        $('form-card').style.display = '';
        setTimeout(() => $('email').focus(), 50);
      }
    });

    function errMsg(code) {
      return ({
        'auth/user-not-found':       'Incorrect email or password.',
        'auth/wrong-password':       'Incorrect email or password.',
        'auth/invalid-credential':   'Incorrect email or password.',
        'auth/invalid-email':        'Please enter a valid email address.',
        'auth/too-many-requests':    'Too many attempts – try again later.',
        'auth/network-request-failed':'Network error – check your connection.',
      })[code] || 'Something went wrong. Try again.';
    }

    function setMsg(txt, ok) {
      const el = $('msg');
      el.className = 'msg ' + (ok ? 'ok' : 'err');
      el.textContent = txt;
    }

    $('btn-login').addEventListener('click', async () => {
      const email = $('email').value.trim(), pass = $('pass').value;
      setMsg('');
      if (!email || !pass) { setMsg('Enter email and password.'); return; }
      const persistence = $('remember-me').checked
        ? firebase.auth.Auth.Persistence.LOCAL
        : firebase.auth.Auth.Persistence.SESSION;
      try {
        await fbAuth.setPersistence(persistence);
        await fbAuth.signInWithEmailAndPassword(email, pass);
      } catch(e) { setMsg(errMsg(e.code)); }
    });

    $('btn-reset').addEventListener('click', async () => {
      const email = $('email').value.trim();
      if (!email) { setMsg('Enter your email above first.'); return; }
      try {
        await fbAuth.sendPasswordResetEmail(email);
        setMsg('Reset email sent – check your inbox.', true);
      } catch(e) { setMsg(errMsg(e.code)); }
    });

    $('pass').addEventListener('keydown', e => { if (e.key === 'Enter') $('btn-login').click(); });

    document.addEventListener('contextmenu', e => e.preventDefault());
    document.addEventListener('keydown', e => {
      const k = e.key.toLowerCase();
      if (e.key === 'F12') { e.preventDefault(); return; }
      if ((e.ctrlKey||e.metaKey) && !e.shiftKey && k === 'u') { e.preventDefault(); return; }
      if ((e.ctrlKey||e.metaKey) && e.shiftKey && (k==='i'||k==='j'||k==='c')) e.preventDefault();
    });
  </script>
</body>
</html>
