<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1" />
  <title>Class Manager — Home</title>
  <link rel="icon" type="image/svg+xml" href="cm-icon.svg" />
  <link rel="apple-touch-icon" sizes="180x180" href="cm-icon.svg" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  <meta name="apple-mobile-web-app-title" content="Class Manager" />
  <meta name="theme-color" content="#0b0d10" />
  <style>
    :root {
      --bg: #0b0d10;
      --card: #141820;
      --border: rgba(255,255,255,.08);
      --accent: #5eead4;
      --muted: #8a94a7;
      --text: #e6eef8;
    }

    *, *::before, *::after { box-sizing: border-box; }

    html, body {
      height: 100%;
      margin: 0;
      font-family: system-ui, -apple-system, Segoe UI, Roboto, Inter, Arial, sans-serif;
      background: var(--bg);
      color: var(--text);
      -webkit-tap-highlight-color: transparent;
    }

    /* ── Auth Loading Spinner ── */
    #auth-loading {
      position: fixed; inset: 0;
      display: flex; align-items: center; justify-content: center;
      background: var(--bg); z-index: 999;
      flex-direction: column; gap: 14px;
    }
    .spin {
      display: inline-block; width: 32px; height: 32px;
      border: 3px solid rgba(255,255,255,.12);
      border-top-color: var(--accent);
      border-radius: 50%;
      animation: spin .7s linear infinite;
    }
    @keyframes spin { to { transform: rotate(360deg); } }
    .spin-label { font-size: 14px; color: var(--muted); }

    /* ── App Shell ── */
    #app { display: none; flex-direction: column; min-height: 100vh; }

    /* ── Header ── */
    header {
      background: var(--card);
      border-bottom: 1px solid var(--border);
      padding: 12px 16px;
      position: sticky; top: 0; z-index: 100;
    }
    .header-inner {
      max-width: 860px; margin: 0 auto;
      display: flex; align-items: center; justify-content: space-between; gap: 12px;
    }
    .header-brand {
      display: flex; align-items: center; gap: 10px;
    }
    .header-brand img {
      width: 28px; height: 28px; flex-shrink: 0;
    }
    .header-brand-text {
      font-size: 16px; font-weight: 700; color: var(--text); letter-spacing: .3px;
    }
    .header-right {
      display: flex; align-items: center; gap: 10px;
    }
    #user-email-display {
      font-size: 12px; color: var(--muted); max-width: 160px;
      overflow: hidden; text-overflow: ellipsis; white-space: nowrap;
    }
    .signout-btn {
      background: rgba(255,255,255,.06);
      border: 1px solid var(--border);
      border-radius: 8px;
      color: var(--muted);
      font-size: 13px;
      font-family: inherit;
      cursor: pointer;
      padding: 7px 13px;
      transition: background .15s, color .15s;
      white-space: nowrap;
      flex-shrink: 0;
    }
    .signout-btn:hover, .signout-btn:active {
      background: rgba(255,255,255,.11); color: var(--text);
    }
    .btn-label { display: inline; }
    .btn-icon  { display: none; font-style: normal; }
    @media (max-width: 480px) {
      #user-email-display { display: none; }
      .btn-label { display: none; }
      .btn-icon  { display: inline; font-size: 18px; }
      .signout-btn { padding: 7px 10px; }
    }

    /* ── Main Content ── */
    .content {
      flex: 1;
      padding: 20px 16px 32px;
      max-width: 860px;
      margin: 0 auto;
      width: 100%;
    }

    .date-line {
      font-size: 13px; color: var(--muted);
      margin-bottom: 22px;
      letter-spacing: .2px;
    }

    /* ── App Grid ── */
    .app-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 14px;
    }

    /* ── App Card ── */
    .app-card {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      text-align: center;
      text-decoration: none;
      color: var(--text);
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: 16px;
      padding: 28px 16px 24px;
      gap: 10px;
      transition: background .15s, border-color .15s, transform .1s;
      cursor: pointer;
      -webkit-tap-highlight-color: transparent;
      user-select: none;
      width: 100%;
    }
    .app-card:hover {
      background: rgba(20,24,32,.9);
      border-color: rgba(255,255,255,.15);
    }
    .app-card:active {
      transform: scale(0.97);
      background: rgba(94,234,212,.07);
      border-color: rgba(94,234,212,.25);
    }
    .app-card.coming-soon {
      opacity: 0.5;
      cursor: not-allowed;
      pointer-events: none;
    }

    .card-icon { font-size: 42px; line-height: 1; }
    .card-title { font-size: 16px; font-weight: 700; color: var(--text); margin: 0; line-height: 1.2; }
    .card-subtitle { font-size: 12px; color: var(--muted); margin: 0; line-height: 1.4; }
    .card-badge {
      font-size: 10px; font-weight: 700; letter-spacing: .5px; text-transform: uppercase;
      background: rgba(251,191,36,.15); color: #fbbf24;
      border: 1px solid rgba(251,191,36,.3);
      border-radius: 6px; padding: 2px 7px;
    }

    @media (max-width: 360px) {
      .app-grid { grid-template-columns: 1fr; }
    }

    /* ── Manage Accounts Modal ── */
    .overlay {
      display: none;
      position: fixed; inset: 0; z-index: 500;
      background: rgba(0,0,0,.6);
      align-items: center; justify-content: center;
      padding: 16px;
    }
    .overlay.open { display: flex; }
    .modal {
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: 16px;
      width: 100%; max-width: 460px;
      max-height: 90vh; display: flex; flex-direction: column;
      overflow: hidden;
    }
    .modal-head {
      display: flex; align-items: center; justify-content: space-between;
      padding: 16px 18px;
      border-bottom: 1px solid var(--border);
    }
    .modal-head h2 { margin: 0; font-size: 17px; font-weight: 700; }
    .modal-close {
      background: none; border: none; color: var(--muted);
      font-size: 26px; line-height: 1; cursor: pointer; padding: 0 4px;
    }
    .modal-close:hover { color: var(--text); }
    .modal-body { padding: 18px; overflow-y: auto; }
    .fg { display: flex; flex-direction: column; gap: 5px; margin-bottom: 12px; }
    .fg label { font-size: 13px; font-weight: 500; color: var(--muted); }
    .fg input {
      background: #0f131a; border: 1px solid rgba(255,255,255,.1);
      border-radius: 10px; color: var(--text); font-size: 15px;
      padding: 10px 13px; width: 100%; outline: none;
      font-family: inherit; transition: border-color .15s;
    }
    .fg input:focus { border-color: var(--accent); }
    .acct-btn {
      background: rgba(255,255,255,.07);
      border: 1px solid rgba(255,255,255,.12);
      border-radius: 10px; color: var(--text); cursor: pointer;
      font-family: inherit; font-size: 14px; padding: 10px 16px; width: 100%;
      transition: background .15s;
    }
    .acct-btn:hover { background: rgba(255,255,255,.12); }
    .acct-btn:disabled { opacity: .55; cursor: default; }
    .acct-btn.primary {
      background: var(--accent); color: #0b0d10;
      border-color: transparent; font-weight: 600;
    }
    .acct-btn.primary:hover { background: #4dd4c0; }
    .acct-msg { font-size: 13px; min-height: 18px; text-align: center; margin-top: 10px; }
    .acct-msg.err { color: #f87171; }
    .acct-msg.ok  { color: #4ade80; }
    .acct-divider { height: 1px; background: var(--border); margin: 20px 0 16px; }
    .acct-list-head {
      font-size: 12px; font-weight: 700; letter-spacing: .5px;
      text-transform: uppercase; color: var(--muted); margin-bottom: 10px;
    }
    .acct-empty { font-size: 13px; color: var(--muted); padding: 8px 0; }
    .acct-row {
      display: flex; align-items: center; justify-content: space-between; gap: 10px;
      padding: 10px 0; border-bottom: 1px solid var(--border);
    }
    .acct-row:last-child { border-bottom: none; }
    .acct-row-email { font-size: 14px; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
    .acct-row-sub { font-size: 11px; color: var(--muted); margin-top: 2px; }
    .acct-revoke {
      background: rgba(248,113,113,.12); border: 1px solid rgba(248,113,113,.3);
      color: #f87171; border-radius: 8px; font-family: inherit; font-size: 12px;
      padding: 6px 11px; cursor: pointer; white-space: nowrap; flex-shrink: 0;
      transition: background .15s;
    }
    .acct-revoke:hover { background: rgba(248,113,113,.2); }
  </style>
</head>
<body>

  <div id="auth-loading">
    <div class="spin"></div>
    <span class="spin-label">Loading…</span>
  </div>

  <div id="app">
    <header>
      <div class="header-inner">
        <div class="header-brand">
          <img src="cm-icon.svg" alt="" />
          <span class="header-brand-text">CLASS MANAGER</span>
        </div>
        <div class="header-right">
          <span id="user-email-display"></span>
          <button id="btn-signout" class="signout-btn">
            <span class="btn-label">Sign Out</span>
            <em class="btn-icon">&#x23FB;</em>
          </button>
        </div>
      </div>
    </header>

    <div class="content">
      <div id="date-line" class="date-line"></div>

      <div class="app-grid">

        <a href="ClassManager.html" class="app-card">
          <div class="card-icon">🎓</div>
          <div class="card-title">Class Manager</div>
          <div class="card-subtitle">Certifications & Classes</div>
        </a>

        <a href="https://pairamedic.github.io/CMSimulator/" target="_blank" rel="noopener" class="app-card">
          <div class="card-icon">🫀</div>
          <div class="card-title">CM Simulator</div>
          <div class="card-subtitle">ACLS Rhythm Simulator</div>
        </a>

        <div id="admin-card" class="app-card" style="display:none" onclick="openAccounts()">
          <div class="card-icon">👤</div>
          <div class="card-title">Manage Accounts</div>
          <div class="card-subtitle">Create &amp; revoke logins</div>
        </div>

      </div>
    </div>
  </div>

  <!-- ── Manage Accounts Modal (admin only) ── -->
  <div id="acct-overlay" class="overlay">
    <div class="modal">
      <div class="modal-head">
        <h2>Manage Accounts</h2>
        <button class="modal-close" onclick="closeAccounts()" aria-label="Close">&times;</button>
      </div>

      <div class="modal-body">
        <form id="acct-form" autocomplete="off">
          <div class="fg">
            <label for="acct-email">Email</label>
            <input id="acct-email" type="email" inputmode="email" placeholder="person@example.com" autocomplete="off" />
          </div>
          <div class="fg">
            <label for="acct-pass">Temporary password</label>
            <input id="acct-pass" type="text" placeholder="At least 6 characters" autocomplete="off" />
          </div>
          <button id="acct-create-btn" type="submit" class="acct-btn primary">Create Account</button>
          <div id="acct-msg" class="acct-msg"></div>
        </form>

        <div class="acct-divider"></div>

        <div class="acct-list-head">Authorized accounts</div>
        <div id="acct-list"><div class="acct-empty">Loading…</div></div>
      </div>
    </div>
  </div>

  <script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-auth-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore-compat.js"></script>
  <script>
    const FB_CONFIG = {
      apiKey: "AIzaSyDDCM69agn_siiIwd9429urrd6ShAQXnyE",
      authDomain: "classmanager-ad588.firebaseapp.com",
      databaseURL: "https://classmanager-ad588-default-rtdb.firebaseio.com",
      projectId: "classmanager-ad588",
      storageBucket: "classmanager-ad588.firebasestorage.app",
      messagingSenderId: "1016222970430",
      appId: "1:1016222970430:web:7e1077fe12ef369ae4576f",
      measurementId: "G-6KX9NP2W7X"
    };
    firebase.initializeApp(FB_CONFIG);

    const fbAuth = firebase.auth();
    const db = firebase.firestore();
    const ADMIN_EMAIL = 'eliasacaldwellnrp@gmail.com';

    // The admin is always allowed. Any other account must have an active entry
    // in the `authorizedUsers` allowlist (created by the admin) to gain access.
    async function isAuthorized(user) {
      if (!user) return false;
      if ((user.email || '').toLowerCase() === ADMIN_EMAIL) return true;
      try {
        const doc = await db.collection('authorizedUsers').doc(user.uid).get();
        return doc.exists && doc.data().active !== false;
      } catch (e) {
        console.error('Authorization check failed:', e);
        return false;
      }
    }

    (function renderDate() {
      const el = document.getElementById('date-line');
      const d = new Date();
      el.textContent = d.toLocaleDateString('en-US', {
        weekday: 'long', year: 'numeric', month: 'long', day: 'numeric'
      });
    })();

    fbAuth.onAuthStateChanged(async function(user) {
      if (!user) {
        window.location.replace('index.html');
        return;
      }
      if (!(await isAuthorized(user))) {
        fbAuth.signOut();
        window.location.replace('index.html');
        return;
      }

      document.getElementById('auth-loading').style.display = 'none';
      const app = document.getElementById('app');
      app.style.display = 'flex';
      document.getElementById('user-email-display').textContent = user.email || '';

      // Only the admin can manage accounts.
      if ((user.email || '').toLowerCase() === ADMIN_EMAIL) {
        document.getElementById('admin-card').style.display = 'flex';
      }
    });

    document.getElementById('btn-signout').addEventListener('click', function() {
      fbAuth.signOut();
    });
  </script>

  <!-- ── Manage Accounts (admin only) ── -->
  <script>
    // A separate Firebase app instance so that creating a user does not replace
    // the admin's own auth session (createUserWithEmailAndPassword signs in the
    // new user on whichever app it is called).
    let secondaryApp = null;
    function secondaryAuth() {
      if (!secondaryApp) {
        secondaryApp = firebase.apps.find(a => a.name === 'accountCreator')
          || firebase.initializeApp(FB_CONFIG, 'accountCreator');
      }
      return secondaryApp.auth();
    }

    const acctMsg = document.getElementById('acct-msg');
    function setAcctMsg(txt, ok) {
      acctMsg.className = 'acct-msg ' + (txt ? (ok ? 'ok' : 'err') : '');
      acctMsg.textContent = txt;
    }

    function openAccounts() {
      document.getElementById('acct-overlay').classList.add('open');
      setAcctMsg('');
      loadAccounts();
    }
    function closeAccounts() {
      document.getElementById('acct-overlay').classList.remove('open');
    }
    document.getElementById('acct-overlay').addEventListener('click', function(e) {
      if (e.target === this) closeAccounts();
    });

    async function loadAccounts() {
      const list = document.getElementById('acct-list');
      list.innerHTML = '<div class="acct-empty">Loading…</div>';
      try {
        const snap = await db.collection('authorizedUsers').orderBy('email').get();
        const docs = snap.docs.filter(d => d.data().active !== false);
        if (!docs.length) {
          list.innerHTML = '<div class="acct-empty">No additional accounts yet.</div>';
          return;
        }
        list.innerHTML = docs.map(d => {
          const u = d.data();
          const created = u.createdAt
            ? new Date(u.createdAt).toLocaleDateString('en-US', { month: 'short', day: 'numeric', year: 'numeric' })
            : '';
          const email = (u.email || '').replace(/"/g, '&quot;');
          return `<div class="acct-row">
            <div style="min-width:0">
              <div class="acct-row-email">${email}</div>
              <div class="acct-row-sub">${created ? 'Added ' + created : ''}</div>
            </div>
            <button class="acct-revoke" onclick="revokeAccount('${d.id}','${email}')">Revoke</button>
          </div>`;
        }).join('');
      } catch (e) {
        console.error(e);
        list.innerHTML = '<div class="acct-empty">Could not load accounts.</div>';
      }
    }

    document.getElementById('acct-form').addEventListener('submit', async function(e) {
      e.preventDefault();
      const email = document.getElementById('acct-email').value.trim();
      const pass = document.getElementById('acct-pass').value;
      const btn = document.getElementById('acct-create-btn');
      setAcctMsg('');

      if (!email || !pass) { setAcctMsg('Email and password are required.'); return; }
      if (pass.length < 6) { setAcctMsg('Password must be at least 6 characters.'); return; }

      btn.disabled = true; btn.textContent = 'Creating…';
      try {
        const cred = await secondaryAuth().createUserWithEmailAndPassword(email, pass);
        const uid = cred.user.uid;
        // Sign the new user out of the secondary app immediately.
        await secondaryAuth().signOut();
        // Add them to the allowlist from the admin's session (authorized to write).
        await db.collection('authorizedUsers').doc(uid).set({
          email: email.toLowerCase(),
          active: true,
          createdAt: Date.now(),
          createdBy: ADMIN_EMAIL
        });
        document.getElementById('acct-email').value = '';
        document.getElementById('acct-pass').value = '';
        setAcctMsg('Account created for ' + email + '.', true);
        loadAccounts();
      } catch (err) {
        const map = {
          'auth/email-already-in-use': 'An account with this email already exists.',
          'auth/invalid-email': 'Please enter a valid email address.',
          'auth/weak-password': 'Password is too weak (use at least 6 characters).',
          'auth/network-request-failed': 'Network error — check your connection.'
        };
        setAcctMsg(map[err.code] || ('Could not create account: ' + (err.message || err.code || 'unknown error')));
      } finally {
        btn.disabled = false; btn.textContent = 'Create Account';
      }
    });

    // Revoking removes the allowlist entry, so the account can no longer sign in.
    // (The Firebase Auth user itself can only be deleted from the Firebase console.)
    async function revokeAccount(uid, email) {
      if (!confirm('Revoke access for ' + email + '?\n\nThey will no longer be able to sign in.')) return;
      try {
        await db.collection('authorizedUsers').doc(uid).delete();
        loadAccounts();
      } catch (e) {
        console.error(e);
        alert('Could not revoke this account. Please try again.');
      }
    }
  </script>
</body>
</html>
